<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manifesting Blocks Quiz — Mindvalley</title>
  <meta name="description" content="A personalized assessment to identify your top 3 manifesting blocks — then get your personalized Manifesting Pathway plan." />
  <meta name="theme-color" content="#7a12d4" />

  <!-- Open Graph -->
  <meta property="og:title" content="What's Blocking Your Manifestation? — Free Personalized Quiz" />
  <meta property="og:description" content="Take this quiz to uncover your top 3 manifesting blocks — and get a personalized plan to dissolve them." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

  <style>
    /* ===== Mindvalley plain tokens (inlined from mindvalley-core.css) ===== */
    :root {
      --font-brand: "Google Sans Flex", Verdana, sans-serif;
      --mv-purple: #7a12d4;
      --mv-purple-light: #9333ea;
      --mv-purple-50: #f9f7fc;
      --mv-purple-100: #e0cfff;
      --mv-border: #e8e0f0;
      --mv-text: #0f131a;
      --mv-text-muted: #4b5563;
      --mv-text-subtle: #6b7280;
      --mv-text-faint: #9ca3af;
      --mv-bg: #ffffff;
    }
    * { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; color: var(--mv-text); font-size: 16px; text-rendering: optimizeLegibility; }
    body { margin: 0; padding: 0; font-family: var(--font-brand); font-weight: 400; background: var(--mv-bg); }
    p { margin: 0 0 1.25rem; }
    p:last-child { margin-bottom: 0; }
    button { font-family: var(--font-brand); }

    /* ===== Funnel shell (MadMuscles-style single centered column) ===== */
    .shell { max-width: 30rem; margin: 0 auto; padding: 0 1.25rem 4rem 1.25rem; }

    /* Top bar: back · logo · step count, thin progress under */
    .topbar {
      position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px); border-bottom: 1px solid #f3f4f6;
    }
    .topbar-inner {
      max-width: 30rem; margin: 0 auto; padding: 0.875rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
    }
    .back-btn {
      width: 2.25rem; height: 2.25rem; border: none; background: transparent; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--mv-text-muted);
      transition: background 0.15s ease; visibility: hidden;
    }
    .back-btn.show { visibility: visible; }
    .back-btn:hover { background: var(--mv-purple-50); color: var(--mv-purple); }
    .logo { font-weight: 700; letter-spacing: 0.14em; font-size: 0.8125rem; color: var(--mv-text); text-transform: uppercase; }
    .logo b { color: var(--mv-purple); }
    .step-count { font-size: 0.8125rem; font-weight: 600; color: var(--mv-text-faint); min-width: 3.25rem; text-align: right; }
    .progress-track { height: 0.25rem; background: #f3f4f6; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--mv-purple), var(--mv-purple-light)); transition: width 0.3s ease; }

    /* ===== Screens ===== */
    .screen { display: none; padding-top: 2rem; }
    .screen.active { display: block; animation: fadeInUp 0.35s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(1rem); } to { opacity: 1; transform: translateY(0); } }

    .q-eyebrow { font-weight: 600; font-size: 0.75rem; line-height: 1.25rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mv-purple); text-align: center; margin-bottom: 0.625rem; }
    .q-title { font-weight: 600; font-size: 1.5rem; line-height: 1.9rem; text-align: center; margin: 0 0 0.625rem 0; letter-spacing: 0.01em; }
    .q-sub { font-size: 0.9375rem; line-height: 1.45rem; color: var(--mv-text-muted); text-align: center; margin: 0 auto 1.75rem auto; max-width: 24rem; }

    /* Option menu — vertical stack of tappable cards */
    .opts { display: flex; flex-direction: column; gap: 0.625rem; }
    .opt {
      display: flex; align-items: center; gap: 0.875rem; width: 100%;
      padding: 1rem 1.125rem; background: #fff; border: 1.5px solid var(--mv-border); border-radius: 1rem;
      font-size: 1rem; font-weight: 500; color: var(--mv-text); cursor: pointer; text-align: left;
      transition: border-color 0.12s ease, background 0.12s ease, transform 0.08s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .opt:hover { border-color: var(--mv-purple-100); background: var(--mv-purple-50); }
    .opt:active { transform: scale(0.985); }
    .opt.selected { border-color: var(--mv-purple); background: var(--mv-purple-50); box-shadow: 0 2px 10px rgba(122, 18, 212, 0.12); }
    .opt .emoji { font-size: 1.375rem; width: 1.75rem; text-align: center; flex-shrink: 0; }
    .opt .opt-label { flex: 1; line-height: 1.35; }
    .opt .tick {
      width: 1.375rem; height: 1.375rem; border-radius: 50%; border: 1.5px solid #d1d5db; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: white; transition: all 0.12s ease;
    }
    .opt.selected .tick { background: linear-gradient(180deg, var(--mv-purple) 0%, var(--mv-purple-light) 100%); border-color: var(--mv-purple); }
    .opt.selected .tick::after { content: '✓'; }

    /* Interstitial / info screens */
    .info-pill {
      display: inline-flex; align-items: center; gap: 0.5rem; margin: 0 auto 1.25rem auto;
      background: linear-gradient(180deg, var(--mv-purple) 0%, var(--mv-purple-light) 100%);
      color: white; padding: 0.5rem 1.25rem; border-radius: 2rem; font-weight: 600; font-size: 0.9375rem;
    }
    .info-center { text-align: center; }
    .info-body { font-size: 1rem; line-height: 1.55rem; color: var(--mv-text-muted); max-width: 24rem; margin: 0 auto 2rem auto; text-align: center; }
    .info-stat-card {
      background: var(--mv-purple-50); border: 1px solid var(--mv-border); border-radius: 1rem;
      padding: 1.25rem 1.5rem; margin: 0 auto 2rem auto; max-width: 24rem; text-align: center;
    }
    .info-stat-card .big { font-size: 1.75rem; font-weight: 700; color: var(--mv-purple); line-height: 1.2; }
    .info-stat-card .small { font-size: 0.875rem; color: var(--mv-text-muted); margin-top: 0.25rem; }

    .btn-primary {
      display: inline-block; width: 100%; padding: 1.05rem 1.5rem; border: none; border-radius: 0.75rem;
      background: linear-gradient(180deg, var(--mv-purple) 0%, var(--mv-purple-light) 100%);
      color: white; font-size: 1.0625rem; font-weight: 700; cursor: pointer; letter-spacing: 0.01em;
      transition: transform 0.1s ease, box-shadow 0.15s ease; box-shadow: 0 6px 16px rgba(122, 18, 212, 0.28);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(122, 18, 212, 0.38); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Loader screen */
    .loader-pct { font-size: 3.25rem; font-weight: 700; color: var(--mv-purple); text-align: center; margin-bottom: 0.25rem; }
    .loader-track { height: 0.5rem; background: #f3f4f6; border-radius: 1rem; overflow: hidden; margin: 1rem 0 2rem 0; }
    .loader-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--mv-purple), var(--mv-purple-light)); border-radius: 1rem; transition: width 0.2s linear; }
    .loader-steps { display: flex; flex-direction: column; gap: 0.75rem; max-width: 22rem; margin: 0 auto; }
    .loader-step { display: flex; align-items: center; gap: 0.75rem; font-size: 0.9375rem; color: var(--mv-text-faint); transition: color 0.2s ease; }
    .loader-step .dot {
      width: 1.25rem; height: 1.25rem; border-radius: 50%; border: 1.5px solid #d1d5db; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 0.6875rem; color: white; transition: all 0.2s ease;
    }
    .loader-step.done { color: var(--mv-text); }
    .loader-step.done .dot { background: linear-gradient(180deg, var(--mv-purple) 0%, var(--mv-purple-light) 100%); border-color: var(--mv-purple); }
    .loader-step.done .dot::after { content: '✓'; }

    /* Email gate */
    .gate-card {
      background: white; border: 2px solid var(--mv-purple); border-radius: 1rem; padding: 2rem 1.5rem;
      position: relative; overflow: hidden;
    }
    .gate-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--mv-purple), var(--mv-purple-light), #c084fc, var(--mv-purple-light), var(--mv-purple));
    }
    .form-field { margin-bottom: 1rem; }
    .form-field label { display: block; font-size: 0.8125rem; font-weight: 600; color: #374151; margin-bottom: 0.375rem; }
    .form-field input[type="text"],
    .form-field input[type="email"] {
      width: 100%; padding: 0.875rem 1rem; border: 1.5px solid #d1d5db; border-radius: 0.625rem;
      font-family: var(--font-brand); font-size: 1rem; transition: border-color 0.15s ease; -webkit-appearance: none;
    }
    .form-field input:focus { outline: none; border-color: var(--mv-purple); box-shadow: 0 0 0 3px rgba(122, 18, 212, 0.1); }
    .form-field input.error { border-color: #dc2626; }
    .form-error { color: #dc2626; font-size: 0.8125rem; margin-top: 0.375rem; display: none; }
    .form-error.visible { display: block; }
    .consent-row { display: flex; align-items: flex-start; gap: 0.5rem; margin: 1rem 0 1.5rem 0; font-size: 0.8125rem; color: var(--mv-text-subtle); line-height: 1.4; }
    .consent-row input[type="checkbox"] { margin-top: 0.15rem; flex-shrink: 0; accent-color: var(--mv-purple); }
    .gate-privacy { text-align: center; font-size: 0.75rem; color: var(--mv-text-faint); margin-top: 1rem; }

    /* Results */
    .top-block-row { display: flex; align-items: flex-start; gap: 0.875rem; padding: 1.125rem 0; border-bottom: 1px solid #f3f4f6; }
    .top-block-row:last-child { border-bottom: none; }
    .rank-num {
      width: 2.25rem; height: 2.25rem; border-radius: 50%;
      background: linear-gradient(180deg, var(--mv-purple) 0%, var(--mv-purple-light) 100%);
      color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9375rem; flex-shrink: 0;
    }
    .top-block-info { flex: 1; min-width: 0; }
    .top-block-name { font-weight: 600; color: var(--mv-text); font-size: 1rem; }
    .top-block-cat { font-size: 0.6875rem; color: var(--mv-text-faint); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.125rem; }
    .top-block-desc { font-size: 0.875rem; color: var(--mv-text-muted); margin-top: 0.4rem; line-height: 1.5; }
    .top-block-score { font-size: 1.25rem; font-weight: 700; color: var(--mv-purple); white-space: nowrap; }
    .top-block-max { font-size: 0.6875rem; color: var(--mv-text-faint); font-weight: 400; }

    .all-scores { margin-top: 1.75rem; }
    .score-bar-row { display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.45rem; }
    .score-bar-label { width: 8.5rem; font-size: 0.75rem; color: #374151; text-align: right; flex-shrink: 0; }
    .score-bar-track { flex: 1; height: 1.25rem; background: #f3f4f6; border-radius: 0.75rem; overflow: hidden; }
    .score-bar-fill { height: 100%; background: linear-gradient(90deg, var(--mv-purple-100), var(--mv-purple)); border-radius: 0.75rem; transition: width 0.6s ease; }
    .score-bar-fill.top3 { background: linear-gradient(90deg, var(--mv-purple), var(--mv-purple-light)); }
    .score-bar-val { width: 1.75rem; font-size: 0.8125rem; font-weight: 600; color: #374151; flex-shrink: 0; }

    /* ===== Order menu (MadMuscles plan-selection design) ===== */
    .chart-card { background: white; border: 1px solid var(--mv-border); border-radius: 1rem; padding: 1.5rem 1.25rem 1rem 1.25rem; margin-bottom: 1.75rem; }
    .chart-title { font-size: 0.8125rem; font-weight: 600; color: var(--mv-text-muted); text-align: center; margin-bottom: 0.75rem; }
    .chart-title b { color: var(--mv-purple); }
    .chart-labels { display: flex; justify-content: space-between; font-size: 0.6875rem; color: var(--mv-text-faint); padding: 0.375rem 0.25rem 0 0.25rem; }

    .timer-bar {
      display: flex; align-items: center; justify-content: center; gap: 0.625rem;
      background: var(--mv-purple-50); border: 1px solid var(--mv-border); border-radius: 0.75rem;
      padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-size: 0.875rem; color: var(--mv-text-muted);
    }
    .timer-bar b { color: var(--mv-purple); font-variant-numeric: tabular-nums; font-size: 1.0625rem; }

    .tiers { display: flex; flex-direction: column; gap: 0.875rem; margin-bottom: 1.25rem; }
    .tier {
      position: relative; display: flex; align-items: center; gap: 0.875rem;
      background: #fff; border: 2px solid var(--mv-border); border-radius: 1rem; padding: 1.125rem 1rem;
      cursor: pointer; transition: border-color 0.12s ease, background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .tier.selected { border-color: var(--mv-purple); background: var(--mv-purple-50); box-shadow: 0 4px 14px rgba(122, 18, 212, 0.14); }
    .tier-badge {
      position: absolute; top: -0.75rem; left: 1rem; padding: 0.25rem 0.75rem; border-radius: 1rem;
      font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      background: #f3f4f6; color: var(--mv-text-subtle);
    }
    .tier-badge.hot { background: linear-gradient(180deg, var(--mv-purple) 0%, var(--mv-purple-light) 100%); color: white; }
    .tier-radio {
      width: 1.375rem; height: 1.375rem; border-radius: 50%; border: 1.5px solid #d1d5db; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 0.6875rem; color: white; transition: all 0.12s ease;
    }
    .tier.selected .tier-radio { background: linear-gradient(180deg, var(--mv-purple) 0%, var(--mv-purple-light) 100%); border-color: var(--mv-purple); }
    .tier.selected .tier-radio::after { content: '✓'; }
    .tier-main { flex: 1; min-width: 0; }
    .tier-name { font-weight: 700; font-size: 1rem; }
    .tier-prices { display: flex; align-items: baseline; gap: 0.5rem; margin-top: 0.25rem; }
    .tier-old { font-size: 0.8125rem; color: var(--mv-text-faint); text-decoration: line-through; }
    .tier-new { font-size: 0.9375rem; font-weight: 600; color: var(--mv-text); }
    .tier-save { font-size: 0.6875rem; font-weight: 700; color: var(--mv-purple); background: var(--mv-purple-100); border-radius: 0.375rem; padding: 0.125rem 0.4rem; }
    .tier-perday { text-align: center; padding-left: 0.875rem; border-left: 1px solid var(--mv-border); min-width: 4.75rem; }
    .tier-perday .amt { font-size: 1.375rem; font-weight: 700; color: var(--mv-text); line-height: 1.1; }
    .tier.selected .tier-perday .amt { color: var(--mv-purple); }
    .tier-perday .per { font-size: 0.6875rem; color: var(--mv-text-faint); }

    .plan-smallprint { font-size: 0.75rem; color: var(--mv-text-faint); line-height: 1.5; text-align: center; margin-top: 1rem; }
    .guarantee-row { display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.8125rem; color: var(--mv-text-muted); margin-top: 1rem; text-align: center; }

    /* ===== Student story cards (real testimonials from stories.mindvalley.com) ===== */
    .stories-stack { display: flex; flex-direction: column; gap: 0.75rem; margin: 0 0 1.75rem 0; text-align: left; }
    .story-card { background: #fff; border: 1px solid var(--mv-border); border-radius: 1rem; padding: 1.125rem 1.25rem; }
    .story-text { font-size: 0.9375rem; line-height: 1.5; color: var(--mv-text); font-weight: 500; margin: 0; }
    .story-meta { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.875rem; }
    .story-avatar {
      width: 3rem; height: 3rem; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(180deg, var(--mv-purple) 0%, var(--mv-purple-light) 100%);
      color: white; font-weight: 700; font-size: 0.9375rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(122, 18, 212, 0.18);
    }
    .story-name { font-size: 0.875rem; font-weight: 600; color: var(--mv-text); }
    .story-sub { font-size: 0.75rem; color: var(--mv-text-faint); }
    .story-stars { color: #f59e0b; font-size: 0.8125rem; letter-spacing: 0.1em; margin-bottom: 0.45rem; }
    .story-verified { display: flex; align-items: center; gap: 0.3rem; font-size: 0.6875rem; color: #059669; font-weight: 600; margin-top: 0.15rem; }
    .story-verified svg { flex-shrink: 0; }
    .story-quest { display: inline-block; margin-top: 0.625rem; font-size: 0.6875rem; font-weight: 700; color: var(--mv-purple); background: var(--mv-purple-100); padding: 0.2rem 0.5rem; border-radius: 0.375rem; }
    .story-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }

    /* ===== Personalized curriculum cards (quest cover + author photo) ===== */
    .curr-card { background: #fff; border: 1px solid var(--mv-border); border-radius: 1rem; margin-bottom: 0.875rem; text-align: left; overflow: hidden; }
    .curr-cover { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; display: block; background: var(--mv-purple-50); }
    .curr-body { padding: 1rem 1.25rem 1.25rem 1.25rem; }
    .curr-week { font-size: 0.6875rem; font-weight: 700; color: var(--mv-purple); letter-spacing: 0.08em; text-transform: uppercase; }
    .curr-quest { font-weight: 700; font-size: 1.0625rem; margin-top: 0.2rem; }
    .curr-author-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
    .curr-author-img { width: 1.875rem; height: 1.875rem; border-radius: 50%; object-fit: cover; display: block; border: 1.5px solid var(--mv-purple-100); }
    .curr-teacher { font-size: 0.78125rem; color: var(--mv-text-subtle); font-weight: 500; }
    .curr-why { font-size: 0.84375rem; color: var(--mv-text-muted); margin-top: 0.625rem; line-height: 1.55; }
    .curr-why b { color: var(--mv-purple); }

    @media (max-width: 380px) {
      .q-title { font-size: 1.3125rem; line-height: 1.7rem; }
      .score-bar-label { width: 6.5rem; }
      .tier-perday { min-width: 4rem; }
    }
  </style>
</head>

  <!-- Top bar -->
  <div class="topbar" id="topbar">
    <div class="topbar-inner">
      <button class="back-btn" id="backBtn" aria-label="Go back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>

  <div class="shell" id="shell"></div>

<script>

    { id: 5, name: 'Wrong Environment', cat: 'The Fuel · Energetic Alignment', qs: [13,14,15],

      if (pct > 100) { clearInterval(iv); setTimeout(next, 400); return; }
      document.getElementById('loaderPct').textContent = pct + '%';
      document.getElementById('loaderFill').style.width = pct + '%';
      [24, 49, 74, 99].forEach(function(threshold, i) {
        if (pct >= threshold) document.getElementById('lstep' + i).classList.add('done');
      });
    }, 55);
  }});

  // ── Email gate ──
  screens.push({ id: 'gate', answerable: false, noBack: true, build: function(root) {
    var card = el('<div class="gate-card"></div>');
    card.appendChild(el('<div class="q-eyebrow">Your results are ready</div>'));
    card.appendChild(el('<h2 class="q-title" style="margin-bottom:0.75rem;">See your top 3 manifesting blocks</h2>'));
    card.appendChild(el('<p class="q-sub" style="margin-bottom:1.5rem;">Enter your details to unlock your personalized assessment — we\'ll also send a copy to your inbox so you can come back to it anytime.</p>'));

    var form = el('<form id="leadForm" novalidate></form>');
    form.innerHTML =
      '<div class="form-field">' +
        '<label for="firstName">First name</label>' +
        '<input type="text" id="firstName" name="firstName" autocomplete="given-name" required />' +
        '<div class="form-error" id="firstNameError">Please enter your first name.</div>' +
      '</div>' +
      '<div class="form-field">' +
        '<label for="email">Email address</label>' +
        '<input type="email" id="email" name="email" autocomplete="email" required />' +
        '<div class="form-error" id="emailError">Please enter a valid email address.</div>' +
      '</div>' +
      '<label class="consent-row">' +
        '<input type="checkbox" id="consent" />' +
        '<span>Yes, send me my results and occasional emails from Mindvalley with manifesting tools, Pathway updates, and related resources. Unsubscribe anytime.</span>' +
      '</label>' +
      '<button type="submit" class="btn-primary" id="submitBtn">Reveal my results</button>' +
      '<p class="gate-privacy">We respect your privacy. Your information is kept secure and never shared.</p>';

    form.addEventListener('submit', onGateSubmit);
    card.appendChild(form);
    root.appendChild(card);
  }});

  // ── Results ──
  screens.push({ id: 'results', answerable: false, noBack: true, build: function(root) {
    var scored = computeScores();
    var sorted = scored.slice().sort(function(a, b) { return b.score - a.score; });
    var top3 = sorted.slice(0, 3);
    var top3Names = top3.map(function(s) { return s.name; });

    root.appendChild(el('<div class="q-eyebrow">' + (firstName ? firstName + ', here are your results' : 'Here are your results') + '</div>'));
    root.appendChild(el('<h2 class="q-title">Your Top 3 Manifesting Blocks</h2>'));
    root.appendChild(el('<p class="q-sub">These are the primary patterns to dissolve first — where the biggest shift lives.</p>'));

    var top3Html = '';
    top3.forEach(function(s, i) {
      top3Html += '<div class="top-block-row">' +
        '<div class="rank-num">' + (i + 1) + '</div>' +
        '<div class="top-block-info">' +
          '<div class="top-block-name">' + s.name + '</div>' +
          '<div class="top-block-cat">' + s.cat + '</div>' +
          '<div class="top-block-desc">' + s.desc + '</div>' +
        '</div>' +
        '<div class="top-block-score">' + s.score + '<span class="top-block-max"> / 15</span></div>' +
        '</div>';
    });
    root.appendChild(el('<div>' + top3Html + '</div>'));

    var barsHtml = '<p class="q-eyebrow" style="text-align:left; margin:1.5rem 0 0.75rem 0;">All Block Scores</p>';
    scored.forEach(function(s) {
      var pct = (s.score / 15 * 100);
      var isTop = top3Names.indexOf(s.name) !== -1;
      barsHtml += '<div class="score-bar-row">' +
        '<div class="score-bar-label">' + s.name + '</div>' +
        '<div class="score-bar-track"><div class="score-bar-fill' + (isTop ? ' top3' : '') + '" style="width:' + pct + '%;"></div></div>' +
        '<div class="score-bar-val">' + s.score + '</div>' +
        '</div>';
    });
    root.appendChild(el('<div class="all-scores">' + barsHtml + '</div>'));

    var btn = el('<button type="button" class="btn-primary" style="margin-top:2rem;">See my personalized plan →</button>');
    btn.addEventListener('click', next);
    root.appendChild(btn);
  }});

  // ── Order menu: Manifesting Pathway plan selection (MadMuscles paywall design) ──
  screens.push({ id: 'plan', answerable: false, noBack: true, build: function(root) {
    var scored = computeScores();
    var sorted = scored.slice().sort(function(a, b) { return b.score - a.score; });
    var topBlock = sorted[0];
    var goal = GOALS[intake.goal] || GOALS.wealth;

    root.appendChild(el('<div class="q-eyebrow">Your Personalized Plan</div>'));
    root.appendChild(el('<h2 class="q-title">The Manifesting Pathway</h2>'));
    root.appendChild(el('<p class="q-sub">' + (firstName ? firstName + ', your' : 'Your') + ' #1 block is <b style="color:var(--mv-purple);">' + topBlock.name + '</b>. The Manifesting Pathway gives you the step-by-step programs, teachers, and daily practices to dissolve it — and manifest ' + goal.noun + '.</p>'));

    // Projection chart (MadMuscles-style results curve)
    var chart = el('<div class="chart-card"></div>');
    chart.appendChild(el('<div class="chart-title">Your projected <b>' + topBlock.name + '</b> intensity on the Pathway</div>'));
    chart.appendChild(el(
      '<svg viewBox="0 0 400 150" width="100%" height="auto" role="img" aria-label="Projected block intensity declining over 12 weeks">' +
        '<defs><linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0%" stop-color="#7a12d4" stop-opacity="0.25"/>' +
          '<stop offset="100%" stop-color="#7a12d4" stop-opacity="0.02"/>' +
        '</linearGradient></defs>' +
        '<path d="M20,30 C120,38 180,70 250,100 C300,120 350,128 380,130 L380,150 L20,150 Z" fill="url(#fillGrad)"/>' +
        '<path d="M20,30 C120,38 180,70 250,100 C300,120 350,128 380,130" fill="none" stroke="#7a12d4" stroke-width="3" stroke-linecap="round"/>' +
        '<circle cx="20" cy="30" r="6" fill="#7a12d4"/>' +
        '<circle cx="380" cy="130" r="6" fill="#9333ea"/>' +
        '<text x="32" y="22" font-size="11" font-weight="600" fill="#4b5563" font-family="sans-serif">High — today</text>' +
        '<text x="290" y="118" font-size="11" font-weight="600" fill="#7a12d4" font-family="sans-serif">Dissolved</text>' +
      '</svg>'
    ));
    chart.appendChild(el('<div class="chart-labels"><span>Now</span><span>Week 4</span><span>Week 8</span><span>Week 12</span></div>'));
    root.appendChild(chart);

    // Personalized curriculum — top 3 blocks mapped to quests, with the why
    root.appendChild(el('<h3 class="q-title" style="font-size:1.25rem; line-height:1.7rem;">Your personalized 12-week curriculum</h3>'));
    root.appendChild(el('<p class="q-sub">Built from your three highest-scoring blocks. Each phase is one Mindvalley quest, chosen specifically to dissolve one of them — in the order that unlocks the others.</p>'));
    var phases = [];
    sorted.slice(0, 3).forEach(function(b) {
      var m = questMap[b.id];
      var existing = null;
      phases.forEach(function(p) { if (p.quest === m.quest) existing = p; });
      if (existing) { existing.blocks.push(b); }
      else { phases.push({ quest: m.quest, teacher: m.teacher, why: m.why, blocks: [b] }); }
    });
    var weekLabels = phases.length === 3 ? ['Weeks 1–4', 'Weeks 5–8', 'Weeks 9–12']
                   : phases.length === 2 ? ['Weeks 1–6', 'Weeks 7–12'] : ['Weeks 1–12'];
    phases.forEach(function(p, i) {
      var blockNames = p.blocks.map(function(b) { return '<b>' + b.name + '</b> (' + b.score + '/15)'; }).join(' and ');
      var assets = questAssets[p.quest] || {};
      var currCard = el('<div class="curr-card">' +
        (assets.cover ? '<img class="curr-cover" src="' + assets.cover + '" alt="' + p.quest + ' quest cover" loading="lazy" />' : '') +
        '<div class="curr-body">' +
          '<div class="curr-week">Phase ' + (i + 1) + ' · ' + weekLabels[i] + '</div>' +
          '<div class="curr-quest">' + p.quest + '</div>' +
          '<div class="curr-author-row">' +
            (assets.authorPhoto ? '<img class="curr-author-img" src="' + assets.authorPhoto + '" alt="' + p.teacher + '" loading="lazy" />' : '') +
            '<span class="curr-teacher">with ' + p.teacher + '</span>' +
          '</div>' +
          '<div class="curr-why">Why: you scored highest on ' + blockNames + '. ' + p.why + '</div>' +
        '</div>' +
        '</div>');
      if (assets.proof) {
        var proofCard = storyCard(assets.proof);
        proofCard.style.margin = '0 1.25rem 1.25rem 1.25rem';
        proofCard.style.background = 'var(--mv-purple-50)';
        currCard.appendChild(proofCard);
      }
      root.appendChild(currCard);
    });
    root.appendChild(el('<p class="q-sub" style="margin-top:0.75rem; margin-bottom:1.75rem; font-size:0.8125rem;">All four quests — plus the full Mindvalley library — are included in your Manifesting Pathway membership.</p>'));

    // Countdown reservation bar
    root.appendChild(el('<div class="timer-bar">⏳ Your results-based discount is reserved for <b id="timerVal">10:00</b></div>'));

    // Tier cards — highest-value tier pre-selected (MadMuscles anchoring pattern)
    var tiersWrap = el('<div class="tiers"></div>');
    tiers.forEach(function(t) {
      var badge = t.badge ? '<div class="tier-badge' + (t.badge.hot ? ' hot' : '') + '">' + t.badge.text + '</div>' : '';
      var save = t.save ? '<span class="tier-save">' + t.save + '</span>' : '';
      var oldPrice = t.old ? '<span class="tier-old">' + t.old + '</span>' : '';
      var card = el('<div class="tier' + (t.key === selectedTier ? ' selected' : '') + '" data-tier="' + t.key + '" role="radio" aria-checked="' + (t.key === selectedTier) + '">' +
        badge +
        '<span class="tier-radio"></span>' +
        '<div class="tier-main">' +
          '<div class="tier-name">' + t.name + '</div>' +
          '<div class="tier-prices">' + oldPrice + '<span class="tier-new">' + t.now + '</span>' + save + '</div>' +
        '</div>' +
        '<div class="tier-perday"><div class="amt">' + t.perday + '</div><div class="per">per day</div></div>' +
        '</div>');
      card.addEventListener('click', function() {
        selectedTier = t.key;
        tiersWrap.querySelectorAll('.tier').forEach(function(x) {
          x.classList.toggle('selected', x.getAttribute('data-tier') === t.key);
          x.setAttribute('aria-checked', x.getAttribute('data-tier') === t.key);
        });
      });
      tiersWrap.appendChild(card);
    });
    root.appendChild(tiersWrap);

    // Answer the "my curriculum is 12 weeks — why buy a year?" objection
    root.appendChild(el('<div class="info-stat-card" style="max-width:none; text-align:left; margin-bottom:1.25rem;">' +
      '<div class="small" style="margin-top:0; font-size:0.84375rem; line-height:1.55;"><b style="color:var(--mv-purple);">Why yearly?</b> Your curriculum dissolves your top 3 blocks in 12 weeks — but you have ' +
      '7 more blocks behind them, and new goals create new ceilings. Yearly keeps every quest, teacher, and practice in your corner for the full journey — and costs less than 5 months at the monthly price.</div>' +
      '</div>'));

    var cta = el('<button type="button" class="btn-primary">Get my Manifesting Pathway plan →</button>');
    cta.addEventListener('click', function() {
      window.open(CHECKOUT_URLS[selectedTier] + '&block=' + encodeURIComponent(topBlock.name), '_blank', 'noopener');
    });
    root.appendChild(cta);

    root.appendChild(el('<div class="guarantee-row">🛡️ 15-day money-back guarantee</div>'));

    // What students manifested — real results wall (stories.mindvalley.com)
    root.appendChild(el('<h3 class="q-title" style="font-size:1.25rem; line-height:1.7rem; margin-top:2.25rem;">What students on these quests manifested</h3>'));
    root.appendChild(el('<p class="q-sub">Real people, real photos, real results — from 25,000+ verified stories at stories.mindvalley.com.</p>'));
    var wall = el('<div class="stories-stack"></div>');
    manifestWall.forEach(function(st) { wall.appendChild(storyCard(st)); });
    root.appendChild(wall);

    var cta2 = el('<button type="button" class="btn-primary">Start my 12-week plan →</button>');
    cta2.addEventListener('click', function() {
      window.open(CHECKOUT_URLS[selectedTier] + '&block=' + encodeURIComponent(topBlock.name), '_blank', 'noopener');
    });
    root.appendChild(cta2);

    root.appendChild(el('<p class="plan-smallprint">Your plan renews at the end of the selected period at the standard rate unless cancelled. Cancel anytime from your account — no questions asked. Prices in USD. Individual results vary.</p>'));

    startTimer();
  }});

  /* =====================================================================
     ENGINE
     ===================================================================== */

  var shell = document.getElementById('shell');
  var screenEls = [];

  screens.forEach(function(s, i) {
    var sec = document.createElement('section');
    sec.className = 'screen';
    sec.setAttribute('data-screen', s.id);
    shell.appendChild(sec);
    screenEls.push(sec);
  });

  function show(i) {
    var s = screens[i];
    var elx = screenEls[i];
    elx.innerHTML = '';
    s.build(elx);
    screenEls.forEach(function(x) { x.classList.remove('active'); });
    elx.classList.add('active');
    current = i;
    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
    updateChrome();
  }

  function next() {
    history.push(current);
    show(current + 1);
  }

  document.getElementById('backBtn').addEventListener('click', function() {
    if (!history.length) return;
    var prev = history.pop();
    show(prev);
  });

  function updateChrome() {
    var s = screens[current];
    var answered = Object.keys(answers).length + ['goal','age','experience'].filter(function(k){ return intake[k]; }).length;
    document.getElementById('progressFill').style.width = (answered / ANSWERABLE * 100) + '%';
    var count = document.getElementById('stepCount');
    count.textContent = s.answerable ? (Math.min(answered + 1, ANSWERABLE)) + ' / ' + ANSWERABLE : '';
    var back = document.getElementById('backBtn');
    back.classList.toggle('show', current > 0 && !s.noBack && history.length > 0);
  }

  /* =====================================================================
     SCORING + LEAD SUBMIT (same payload shape as Quiz Option A)
     ===================================================================== */

  function computeScores() {
    return blocks.map(function(b) {
      var total = 0;
      b.qs.forEach(function(q) { total += (answers[q] || 0); });
      return { id: b.id, name: b.name, cat: b.cat, desc: b.desc, score: total };
    });
  }

  function onGateSubmit(e) {
    e.preventDefault();
    var fnInput = document.getElementById('firstName');
    var emInput = document.getElementById('email');
    var fnErr = document.getElementById('firstNameError');
    var emErr = document.getElementById('emailError');
    var valid = true;

    fnInput.classList.remove('error'); fnErr.classList.remove('visible');
    emInput.classList.remove('error'); emErr.classList.remove('visible');

    if (!fnInput.value.trim()) { fnInput.classList.add('error'); fnErr.classList.add('visible'); valid = false; }
    var emailVal = emInput.value.trim();
    var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailVal || !emailRe.test(emailVal)) { emInput.classList.add('error'); emErr.classList.add('visible'); valid = false; }
    if (!valid) return;

    firstName = fnInput.value.trim();
    var consent = document.getElementById('consent').checked;
    var scored = computeScores();
    var sorted = scored.slice().sort(function(a, b) { return b.score - a.score; });
    var top3 = sorted.slice(0, 3);

    var payload = {
      version: 'blocks-v2-madmuscles',
      firstName: firstName,
      email: emailVal,
      consent: consent,
      submittedAt: new Date().toISOString(),
      goal: intake.goal,
      age: intake.age,
      experience: intake.experience,
      topBlocks: top3.map(function(b) { return { id: b.id, name: b.name, score: b.score }; }),
      allScores: scored.map(function(b) { return { id: b.id, name: b.name, score: b.score }; }),
      rawAnswers: answers,
      utm: {
        source: getQueryParam('utm_source'),
        medium: getQueryParam('utm_medium'),
        campaign: getQueryParam('utm_campaign'),
        term: getQueryParam('utm_term'),
        content: getQueryParam('utm_content')
      },
      referrer: document.referrer || null,
      userAgent: navigator.userAgent
    };
    submitLead(payload);
    next(); // → results
  }

  function submitLead(payload) {
    try {
      fetch('/api/submit-lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        keepalive: true
      }).catch(function() { /* silent */ });
    } catch (e) { /* silent */ }
  }

  function getQueryParam(name) {
    var m = window.location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  }

  /* ── Discount reservation countdown ── */
  var timerIv = null;
  function startTimer() {
    var secs = 600;
    if (timerIv) clearInterval(timerIv);
    timerIv = setInterval(function() {
      secs = Math.max(0, secs - 1);
      var m = Math.floor(secs / 60), s = secs % 60;
      var elx = document.getElementById('timerVal');
      if (elx) elx.textContent = (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
      if (secs === 0) clearInterval(timerIv);
    }, 1000);
  }

  // Boot
  show(0);
})();
</script>

</body>
</html>
